<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Graphics &#8212; Supply Ordering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
:root{
  --primary:#ff5500;--primary-light:#ff7733;--primary-pale:#1a0900;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
  --bg:#0c0c0c;--card:#151515;--card2:#1b1b1b;--border:#252525;
  --text:#ede8de;--muted:#5a5650;--shadow:0 2px 12px rgba(0,0,0,.5)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk','Barlow',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{color:var(--primary);text-decoration:none}

/* Header */
.hdr{background:#0c0c0c;border-bottom:3px solid #a3e635;color:var(--text);padding:0 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:80px}
.hdr-logo{display:flex;align-items:center}
.hdr-logo img{height:44px;width:auto;object-fit:contain}
.hdr-left{display:flex;align-items:center}
.hdr-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text);line-height:1}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.hdr-badge{background:transparent;border:1px solid var(--border);padding:3px 12px;border-radius:2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--primary);font-family:'Space Grotesk',sans-serif}

/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:24px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0}
.tab{padding:12px 20px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
.card-hdr{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card2)}
.card-hdr h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
.card-body{padding:20px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:18px 20px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted)}
.stat.warn::before{background:var(--warning)}
.stat.danger::before{background:var(--danger)}
.stat.ok::before{background:var(--success)}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.14em;font-family:'Space Grotesk',sans-serif;font-weight:600}
.stat.warn .stat-val{color:var(--warning)}
.stat.danger .stat-val{color:var(--danger)}
.stat.ok .stat-val{color:var(--success)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;font-family:'IBM Plex Mono',monospace}
.b-ok{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.b-low{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.b-crit{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.b-pending{background:rgba(255,85,0,.12);color:var(--primary);border:1px solid rgba(255,85,0,.25)}
.b-ordered{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
.b-fulfilled{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.b-cancelled{background:rgba(90,86,80,.12);color:var(--muted);border:1px solid var(--border)}
.b-demo{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}

/* Alerts */
.alert{padding:11px 16px;border-radius:2px;margin-bottom:14px;font-size:13px;border-left:3px solid}
.alert ul{margin:6px 0 0 16px}
.alert-warn{background:rgba(245,158,11,.07);border-color:var(--warning);color:#f59e0b}
.alert-crit{background:rgba(239,68,68,.07);border-color:var(--danger);color:#ef4444}
.alert-info{background:rgba(255,85,0,.07);border-color:var(--primary);color:var(--primary)}
.alert-demo{background:rgba(245,158,11,.06);border:1px dashed rgba(245,158,11,.35);border-left:3px solid #f59e0b;color:#f59e0b;padding:12px 16px}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--card2);border-bottom:1px solid var(--border);white-space:nowrap;font-family:'IBM Plex Mono',monospace}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.td-item{font-weight:600}
.td-muted{color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:2px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.10em;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text);color:var(--text)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warning);color:#000}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Forms */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
label{display:block;font-size:10px;font-weight:700;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'IBM Plex Mono',monospace}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:2px;font-size:13px;color:var(--text);background:#0a0a0a;transition:border-color .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(255,85,0,.1)}
textarea{resize:vertical;min-height:70px}
select option{background:#151515}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-wrap input{padding-left:34px}

/* Filter row */
.frow{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.frow select{width:auto}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(3px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:3px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.modal-hdr{padding:15px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card2);z-index:1}
.modal-hdr h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.modal-body{padding:22px}
.modal-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}
.close-btn{background:none;border:1px solid transparent;font-size:18px;cursor:pointer;color:var(--muted);padding:2px 8px;border-radius:2px;line-height:1}
.close-btn:hover{background:var(--card2);color:var(--text);border-color:var(--border)}

/* Order item rows */
.order-items-list{display:flex;flex-direction:column;gap:2px;max-height:350px;overflow-y:auto}
.oi{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.oi:last-child{border-bottom:none}
.oi-name{flex:1;font-size:13px}
.oi-vendor{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.oi-qty{width:70px}
.oi-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:2px}
.oi-remove:hover{color:var(--danger);background:rgba(239,68,68,.1)}

/* Cart counter */
.cart-btn{position:relative}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:2px;font-size:9px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:'IBM Plex Mono',monospace}

/* Landing */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:40px;background:var(--bg)}
.landing-top{text-align:center}
.landing-logo{font-size:48px;margin-bottom:16px}
.landing h1{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.10em}
.landing p{color:var(--muted);max-width:380px;line-height:1.6}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;max-width:620px;width:100%}
.dept-card{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .18s;font-weight:600}
.dept-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,85,0,.12)}
.dept-card .icon{font-size:28px;margin-bottom:8px}
.dept-card .name{font-size:12px;text-transform:uppercase;letter-spacing:.07em;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted)}
.dept-card:hover .name{color:var(--primary)}
.admin-link{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.admin-link:hover{color:var(--text)}

/* Admin login */
.login-box{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:36px;max-width:360px;width:100%}
.login-box h2{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px;text-align:center;text-transform:uppercase;letter-spacing:.14em}
.login-box p{color:var(--muted);text-align:center;margin-bottom:24px;font-size:13px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:2px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s;text-transform:uppercase;letter-spacing:.05em;font-family:'Barlow Condensed',sans-serif}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Toast */
#toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:#1c1c1c;color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:2px;font-size:12px;min-width:200px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:toastIn .2s ease;font-family:'IBM Plex Mono',monospace}
.toast-ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#22c55e}
.toast-err{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444}
@keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Loading */
.loader{text-align:center;padding:50px;color:var(--muted)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Utils */
.hidden{display:none!important}
.mb-0{margin-bottom:0}
.text-center{text-align:center}
.text-muted{color:var(--muted)}
.fw-bold{font-weight:600}
.flex{display:flex;gap:10px;align-items:center}
.flex-1{flex:1}
.mt-4{margin-top:16px}
.stock-bar-wrap{display:flex;align-items:center;gap:8px}
.stock-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;width:80px;flex-shrink:0}
.stock-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .icon{font-size:36px;margin-bottom:10px;opacity:.35}
.qty-num{width:65px;text-align:center}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
@media(max-width:640px){.wrap{padding:12px}.form-row{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.hdr{padding:8px 14px;height:64px}.hdr-logo img{height:32px}}

/* ── ENHANCEMENTS ─────────────────────────────────────── */

/* Orange racing stripe at very top of viewport */
html{border-top:none}

/* Subtle dot-grid texture on the background */
body{background-image:radial-gradient(circle,rgba(255,255,255,.038) 1px,transparent 1px);background-size:28px 28px}

/* Thin dark scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ── KEYFRAMES ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes titleReveal{from{opacity:0;letter-spacing:.18em}to{opacity:1;letter-spacing:.03em}}
@keyframes critPulse{0%,100%{border-color:rgba(239,68,68,.25);box-shadow:none}50%{border-color:rgba(239,68,68,.9);box-shadow:0 0 7px rgba(239,68,68,.35)}}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── ENTRANCE ANIMATIONS ──────────────────────────────── */

/* Stats stagger in */
.stat{animation:fadeUp .32s ease both}
.stat:nth-child(2){animation-delay:.07s}
.stat:nth-child(3){animation-delay:.14s}
.stat:nth-child(4){animation-delay:.21s}
.stat:nth-child(5){animation-delay:.28s}

/* Cards fade up */
.card{animation:fadeUp .28s ease both}

/* Landing — dept cards stagger */
.dept-card{opacity:0;animation:cardIn .42s cubic-bezier(.16,1,.3,1) forwards}
.dept-card:nth-child(1){animation-delay:.1s}
.dept-card:nth-child(2){animation-delay:.17s}
.dept-card:nth-child(3){animation-delay:.24s}
.dept-card:nth-child(4){animation-delay:.31s}
.dept-card:nth-child(5){animation-delay:.38s}

/* Landing copy */
.landing h1{animation:titleReveal .55s cubic-bezier(.16,1,.3,1) .08s both}
.landing-top p{animation:fadeUp .4s ease .22s both}
.landing-logo{animation:fadeIn .3s ease both}

/* Modal slide in */
.modal{animation:modalIn .22s cubic-bezier(.16,1,.3,1)}

/* Alerts */
.alert{animation:fadeIn .18s ease both}

/* ── MICRO-INTERACTIONS ────────────────────────────────── */

/* Button press */
.btn:active:not(:disabled){transform:scale(.96)}

/* Table row left-edge accent on hover */
td{transition:background .1s,box-shadow .1s}
tr:hover td:first-child{box-shadow:inset 3px 0 0 var(--primary)}

/* Critical badge breathing pulse */
.b-crit{animation:critPulse 2.2s ease-in-out infinite}

/* Dept card orange glow on hover */
.dept-card{transition:border-color .18s,transform .18s,box-shadow .18s}
.dept-card:hover{box-shadow:0 0 0 1px var(--primary),0 10px 36px rgba(255,85,0,.14)}

/* Stock bar slightly taller + transition */
.stock-bar{height:5px}
.stock-bar-fill{transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Form inputs — subtle left border on focus */
input:focus,select:focus,textarea:focus{border-left-width:2px;border-left-color:var(--primary)}

/* Header logo */
.hdr-logo img{filter:brightness(1.08);transition:filter .15s,transform .15s}
.hdr-logo img:hover{filter:brightness(1.2);transform:scale(1.03)}

/* ── STOCK SLIDER ─────────────────────────────────────── */
.stock-slider-wrap{display:flex;align-items:center;gap:10px;width:100%;min-width:150px;padding:2px 0}
.stock-slider-num{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;min-width:22px;text-align:right;transition:color .15s}
.stock-slider{-webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:2px;outline:none;cursor:pointer;border:none;background:var(--border);transition:height .12s}
.stock-slider:hover{height:7px}
.stock-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid currentColor;cursor:grab;box-shadow:0 1px 6px rgba(0,0,0,.5);transition:transform .1s,box-shadow .1s}
.stock-slider::-webkit-slider-thumb:hover{transform:scale(1.25);box-shadow:0 2px 10px rgba(0,0,0,.6)}
.stock-slider::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.35)}
.stock-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid currentColor;cursor:grab;box-shadow:0 1px 6px rgba(0,0,0,.5)}
.stock-slider::-moz-range-track{height:5px;border-radius:2px;background:var(--border)}
</style>
</head>

<script type="text/template" id="apps-script">
// ================================================================
// LIQUID GRAPHICS &#8212; SUPPLY ORDERING SYSTEM &#8212; Google Apps Script
// Instructions: Extensions > Apps Script > paste this > Deploy
// ================================================================

const SHEET_PRODUCTS  = 'Products';
const SHEET_ORDERS    = 'Orders';
const SHEET_DEPTS     = 'Departments';

function doGet(e) {
  const p = e.parameter;
  let result;
  try {
    switch (p.action) {
      case 'init':       result = initSheets(); break;
      case 'catalog':    result = getCatalog(); break;
      case 'inventory':  result = getInventory(p.dept); break;
      case 'orders':     result = getOrders(p.dept, p.key); break;
      case 'submitOrder':result = submitOrder(JSON.parse(p.data)); break;
      case 'updateStock':result = updateStock(JSON.parse(p.data)); break;
      case 'updateOrder':  result = updateOrderStatus(JSON.parse(p.data), p.key); break;
      case 'getDepts':     result = getDepts(); break;
      case 'addProduct':   result = addProduct(JSON.parse(p.data)); break;
      case 'deleteProduct':result = deleteProduct(p.id); break;
      default:             result = { error: 'Unknown action: ' + p.action };
    }
  } catch(err) {
    result = { error: err.toString() };
  }
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function initSheets() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  // Create Products sheet if needed
  let ps = ss.getSheetByName(SHEET_PRODUCTS);
  if (!ps) {
    ps = ss.insertSheet(SHEET_PRODUCTS);
    ps.getRange(1,1,1,10).setValues([[
      'ID','Part#','Item','Vendor','Unit','Department','MinStock','CurrentStock','ReorderPoint','Notes'
    ]]);
    ps.getRange(1,1,1,10).setFontWeight('bold').setBackground('#1e40af').setFontColor('#ffffff');
    ps.setFrozenRows(1);
  }
  // Create Orders sheet
  let os = ss.getSheetByName(SHEET_ORDERS);
  if (!os) {
    os = ss.insertSheet(SHEET_ORDERS);
    os.getRange(1,1,1,9).setValues([[
      'OrderID','Timestamp','Department','Requester','Items','Notes','Status','AdminNotes','UpdatedAt'
    ]]);
    os.getRange(1,1,1,9).setFontWeight('bold').setBackground('#1e40af').setFontColor('#ffffff');
    os.setFrozenRows(1);
  }
  // Create Departments sheet
  let ds = ss.getSheetByName(SHEET_DEPTS);
  if (!ds) {
    ds = ss.insertSheet(SHEET_DEPTS);
    ds.getRange(1,1,1,3).setValues([['Code','Name','Icon']]);
    ds.getRange(1,1,1,3).setFontWeight('bold').setBackground('#1e40af').setFontColor('#ffffff');
    ds.setFrozenRows(1);
    ds.getRange(2,1,5,3).setValues([
      ['INK','Ink Department','&#127912;'],['SCREEN','Screen Dept','&#128444;&#65039;'],
      ['PACK','Packaging','&#128230;'],['PROD','Production','&#9881;&#65039;'],['AR','Art & Embroidery','&#9986;&#65039;']
    ]);
  }
  return { ok: true, message: 'Sheets initialized! Now import your product catalog.' };
}

function getCatalog() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const ps = ss.getSheetByName(SHEET_PRODUCTS);
  if (!ps) return { error: 'Products sheet not found. Call ?action=init first.' };
  const data = ps.getDataRange().getValues();
  const headers = data[0];
  const products = data.slice(1).filter(r => r[2]).map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i]);
    return obj;
  });
  return { products };
}

function getInventory(dept) {
  const catalog = getCatalog();
  if (catalog.error) return catalog;
  const products = dept ? catalog.products.filter(p => p.Department === dept || !dept) : catalog.products;
  return { products };
}

function getOrders(dept, key) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const os = ss.getSheetByName(SHEET_ORDERS);
  if (!os) return { orders: [] };
  const data = os.getDataRange().getValues();
  const headers = data[0];
  let orders = data.slice(1).filter(r => r[0]).map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i]);
    try { obj.Items = JSON.parse(obj.Items); } catch(e) {}
    return obj;
  });
  if (dept && !key) orders = orders.filter(o => o.Department === dept);
  orders.sort((a,b) => new Date(b.Timestamp) - new Date(a.Timestamp));
  return { orders };
}

function submitOrder(data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const os = ss.getSheetByName(SHEET_ORDERS);
  if (!os) return { error: 'Orders sheet not found' };
  const id = 'ORD-' + Date.now();
  const now = new Date().toISOString();
  os.appendRow([id, now, data.dept, data.requester, JSON.stringify(data.items), data.notes||'', 'Pending','', now]);
  return { ok: true, orderId: id };
}

function updateStock(data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const ps = ss.getSheetByName(SHEET_PRODUCTS);
  if (!ps) return { error: 'Products sheet not found' };
  const rows = ps.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0] === data.id) {
      ps.getRange(i+1, 8).setValue(data.stock); // CurrentStock col
      if (data.minStock !== undefined) ps.getRange(i+1, 7).setValue(data.minStock);
      if (data.reorderPoint !== undefined) ps.getRange(i+1, 9).setValue(data.reorderPoint);
      return { ok: true };
    }
  }
  return { error: 'Product not found: ' + data.id };
}

function updateOrderStatus(data, key) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const os = ss.getSheetByName(SHEET_ORDERS);
  if (!os) return { error: 'Orders sheet not found' };
  const rows = os.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0] === data.orderId) {
      os.getRange(i+1, 7).setValue(data.status);
      if (data.adminNotes) os.getRange(i+1, 8).setValue(data.adminNotes);
      os.getRange(i+1, 9).setValue(new Date().toISOString());
      return { ok: true };
    }
  }
  return { error: 'Order not found: ' + data.orderId };
}

function addProduct(data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const ps = ss.getSheetByName(SHEET_PRODUCTS);
  if (!ps) return { error: 'Products sheet not found. Run ?action=init first.' };
  const id = data.id || ('P-' + Date.now());
  ps.appendRow([
    id,
    data.part   || '',
    data.item   || '',
    data.vendor || '',
    data.unit   || '',
    data.dept   || '',
    data.minStock !== null && data.minStock !== undefined ? data.minStock : '',
    data.stock    !== null && data.stock    !== undefined ? data.stock    : '',
    '',
    data.notes  || ''
  ]);
  return { ok: true, id };
}

function deleteProduct(id) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const ps = ss.getSheetByName(SHEET_PRODUCTS);
  if (!ps) return { error: 'Products sheet not found.' };
  const rows = ps.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (String(rows[i][0]) === String(id)) {
      ps.deleteRow(i + 1);
      return { ok: true };
    }
  }
  return { error: 'Product not found: ' + id };
}

function getDepts() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const ds = ss.getSheetByName(SHEET_DEPTS);
  if (!ds) return { depts: [] };
  const data = ds.getDataRange().getValues();
  const depts = data.slice(1).filter(r=>r[0]).map(r=>({code:r[0],name:r[1],icon:r[2]}));
  return { depts };
}

// ================================================================
// &#127760;  API LAYER
// ================================================================
const isDemo = () => !CFG.API || CFG.API.includes('YOUR_APPS');

function lsGet(key, def) {
  try { return JSON.parse(localStorage.getItem('lg_'+key)) ?? def; } catch { return def; }
}
function lsSet(key, val) { localStorage.setItem('lg_'+key, JSON.stringify(val)); }

async function apiCall(params) {
  if (isDemo()) return null; // handled by demo logic
  const url = new URL(CFG.API);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v)));
  try {
    const r = await fetch(url.toString(), {redirect:'follow'});
    return await r.json();
  } catch(e) {
    console.error('API error:', e);
    return {error: e.message};
  }
}

async function loadCatalog() {
  if (isDemo()) {
    // Use built-in catalog + localStorage overrides
    const overrides = lsGet('catalog_overrides', {});
    return CATALOG.map(p => ({...p, ...(overrides[p.id]||{})}));
  }
  const r = await apiCall({action:'catalog'});
  if (r?.products?.length) {
    return r.products.map(p => ({
      id: p['ID'] || p.id,
      part: p['Part#'] || p.part || '',
      item: p['Item'] || p.item || '',
      vendor: p['Vendor'] || p.vendor || '',
      unit: p['Unit'] || p.unit || '',
      dept: p['Department'] || p.dept || '',
      minStock: p['MinStock'] ?? p.minStock ?? null,
      stock: p['CurrentStock'] ?? p.stock ?? null,
    }));
  }
  return CATALOG; // fallback
}

async function loadOrders(dept) {
  if (isDemo()) return lsGet('orders', []).filter(o => !dept || o.dept === dept);
  const r = await apiCall({action:'orders', dept: dept||'', key: S.adminAuth ? CFG.ADMIN_PASS : ''});
  return r?.orders?.map(o => ({
    id: o.OrderID || o.id,
    ts: o.Timestamp || o.ts,
    dept: o.Department || o.dept,
    requester: o.Requester || o.requester,
    items: Array.isArray(o.Items) ? o.Items : o.items || [],
    notes: o.Notes || o.notes || '',
    status: o.Status || o.status || 'Pending',
    adminNotes: o.AdminNotes || o.adminNotes || '',
  })) || [];
}

async function submitOrderApi(data) {
  if (isDemo()) {
    const orders = lsGet('orders', []);
    const order = {id:'ORD-'+Date.now(), ts:new Date().toISOString(), ...data, status:'Pending', adminNotes:''};
    orders.unshift(order);
    lsSet('orders', orders);
    return {ok:true, orderId:order.id};
  }
  const result = await apiCall({action:'submitOrder', data});
  // Push notification via ntfy.sh
  try {
    const itemList = data.items.map(i => i.item + ' x' + i.qty).join(', ');
    await fetch('https://ntfy.sh/lg-supply-orders-liquidgraphics', {
      method: 'POST',
      headers: {
        'Title': 'New Supply Order — ' + data.dept,
        'Priority': 'high',
        'Tags': 'shopping'
      },
      body: 'From: ' + data.requester + '\nItems: ' + itemList + (data.notes ? '\nNotes: ' + data.notes : '')
    });
  } catch(e) {}
  return result;
}

async function updateStockApi(id, stock, minStock, reorderPoint) {
  if (isDemo()) {
    const overrides = lsGet('catalog_overrides', {});
    overrides[id] = {...(overrides[id]||{}), stock, minStock, reorderPoint};
    lsSet('catalog_overrides', overrides);
    return {ok:true};
  }
  return await apiCall({action:'updateStock', data:{id, stock, minStock, reorderPoint}});
}

async function updateOrderStatusApi(orderId, status, adminNotes) {
  if (isDemo()) {
    const orders = lsGet('orders', []);
    const idx = orders.findIndex(o => o.id === orderId);
    if (idx >= 0) { orders[idx].status = status; orders[idx].adminNotes = adminNotes||''; lsSet('orders', orders); }
    return {ok:true};
  }
  return await apiCall({action:'updateOrder', data:{orderId, status, adminNotes}, key:CFG.ADMIN_PASS});
}

async function addProductApi(data) {
  if (isDemo()) {
    const overrides = lsGet('catalog_overrides', {});
    overrides[data.id] = data;
    lsSet('catalog_overrides', overrides);
    return {ok:true};
  }
  return await apiCall({action:'addProduct', data});
}

async function deleteProductApi(id) {
  if (isDemo()) {
    const overrides = lsGet('catalog_overrides', {});
    delete overrides[id];
    lsSet('catalog_overrides', overrides);
    const deleted = lsGet('catalog_deleted', []);
    if (!deleted.includes(id)) { deleted.push(id); lsSet('catalog_deleted', deleted); }
    return {ok:true};
  }
  return await apiCall({action:'deleteProduct', id});
}

// ================================================================
// &#127991;&#65039;  HELPERS
// ================================================================
function stockStatus(p) {
  if (p.stock === null || p.stock === undefined) return null;
  const s = Number(p.stock), m = Number(p.minStock);
  if (!m) { if (s === 0) return 'critical'; return 'ok'; }
  if (s <= m * CFG.CRIT_THRESH) return 'critical';
  if (s <= m * CFG.LOW_THRESH)  return 'low';
  return 'ok';
}

function stockBadge(p) {
  const st = stockStatus(p);
  if (!st) return '<span class="badge b-ok">&#8212;</span>';
  if (st==='critical') return '<span class="badge b-crit"><i class="ph ph-warning-circle"></i> Critical</span>';
  if (st==='low')      return '<span class="badge b-low"><i class="ph ph-warning"></i> Low</span>';
  return '<span class="badge b-ok"><i class="ph ph-check-circle"></i> OK</span>';
}

function orderBadge(status) {
  const map = {Pending:'b-pending',Ordered:'b-ordered',Fulfilled:'b-fulfilled',Cancelled:'b-cancelled'};
  return `<span class="badge ${map[status]||'b-pending'}">${status}</span>`;
}

function fmtDate(ts) {
  if (!ts) return '&#8212;';
  try { return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }
  catch{ return ts; }
}

function getDeptName(id) {
  return CFG.DEPTS.find(d=>d.id===id)?.name || id;
}

function toast(msg, type='') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' toast-'+type : '');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.style.opacity='0', 2700);
  setTimeout(() => el.remove(), 3000);
}

function setHTML(html) { document.getElementById('app').innerHTML = html; }

// ================================================================
async function init() {
  const params = new URLSearchParams(location.search);
  const dept = (params.get('dept')||'').toUpperCase();
  const view = params.get('view')||'';

  S.isDemo = isDemo();
  S.catalog = await loadCatalog();

  if (view === 'admin') { renderAdminLogin(); return; }
  if (dept && CFG.DEPTS.find(d=>d.id===dept)) { S.dept=dept; await renderDept(); return; }
  S.dept = 'SCREEN'; await renderDept();
}

      <div class="hdr-logo" onclick="renderAdminLogin()" title="Admin Access" style="cursor:pointer">

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tabs = ['inventory','orders','catalog'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)]?.classList.add('active');
  renderTabContent();
}

function renderTabContent() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (S.tab==='inventory') el.innerHTML = renderInventoryTab();
  else if (S.tab==='orders') el.innerHTML = renderOrdersTab();
  else el.innerHTML = renderCatalogTab();
}

function stockColor(st, val) {
  if (st==='critical' || (!st && val===0)) return '#ef4444';
  if (st==='low') return '#f59e0b';
  return '#22c55e';
}

function sliderStyle(val, max, color) {
  const pct = max > 0 ? Math.min(100, Math.round((val / max) * 100)) : 0;
  return `background:linear-gradient(to right,${color} ${pct}%,#252525 ${pct}%);color:${color}`;
}

function invRow(p, showDept) {
  const st = stockStatus(p);
  let bar;
  if (p.stock !== null && p.stock !== undefined) {
    const maxStock = Math.max((p.minStock || 0) * 4, (p.stock || 0) + 10, 20);
    const color = stockColor(st, p.stock);
    bar = `<div class="stock-slider-wrap">
      <span class="stock-slider-num" id="snum-${p.id}" style="color:${color}">${p.stock??0}</span>
      <input type="range" class="stock-slider"
        id="sld-${p.id}" min="0" max="${maxStock}" value="${p.stock??0}"
        style="${sliderStyle(p.stock??0, maxStock, color)}"
        data-id="${p.id}" data-min="${p.minStock??0}" data-max="${maxStock}"
        oninput="slideStock(this)" onchange="saveStock(this)">
    </div>`;
  } else {
    bar = `<span class="td-muted" style="cursor:pointer;font-size:11px" onclick="initStock('${p.id}')">+ Set stock</span>`;
  }
  return `<tr data-id="${p.id}" data-item="${p.item.toLowerCase()}" data-vendor="${p.vendor.toLowerCase()}">
    <td>${stockBadge(p)}</td>
    <td class="td-item"><span contenteditable="true" spellcheck="false" style="outline:none;border-bottom:1px dashed transparent;cursor:text;display:inline-block;min-width:60px;padding:1px 3px;border-radius:3px" onfocus="this.style.borderBottomColor='var(--primary)';this.style.background='rgba(255,85,0,.06)'" onblur="saveItemName('${p.id}',this.textContent.trim());this.style.borderBottomColor='transparent';this.style.background=''" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${p.item}</span>${showDept?`<div class="td-muted">${getDeptName(p.dept)}</div>`:''}</td>
    <td class="td-muted">${p.part||'&#8212;'}</td>
    <td>${p.vendor}</td>
    <td class="td-muted">${p.unit||'&#8212;'}</td>
    <td style="min-width:180px">${bar}</td>
    <td style="text-align:center" class="td-muted">${p.minStock??'&#8212;'}</td>
    <td style="white-space:nowrap"><input type="number" min="1" value="1" id="qty-${p.id}" style="width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:2px;font-size:13px;text-align:center;vertical-align:middle;margin-right:4px;background:#0a0a0a;color:var(--text)"><button class="btn btn-sm ${st==='critical'?'btn-danger':st==='low'?'btn-warn':'btn-secondary'}" onclick="addToCart('${p.id}')">+ Request</button></td>
  </tr>`;
}

function slideStock(el) {
  const id = el.dataset.id;
  const val = parseInt(el.value);
  const minStock = parseInt(el.dataset.min) || 0;
  const maxStock = parseInt(el.dataset.max) || 20;
  const st = !minStock ? (val===0?'critical':'ok') : val<=minStock?'critical':val<=minStock*1.5?'low':'ok';
  const color = stockColor(st, val);
  el.style.cssText = sliderStyle(val, maxStock, color);
  const numEl = document.getElementById('snum-' + id);
  if (numEl) { numEl.textContent = val; numEl.style.color = color; }
}

async function saveStock(el) {
  const id = el.dataset.id;
  const val = parseInt(el.value);
  const prod = S.catalog.find(p => p.id === id);
  if (!prod) return;
  prod.stock = val;
  // Refresh badge
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (row) { const bd = row.querySelector('td:first-child'); if (bd) bd.innerHTML = stockBadge(prod); }
  const r = await updateStockApi(id, val, prod.minStock, null);
  if (r?.ok || r) toast(`Stock: ${prod.item} → ${val}`, 'ok');
}

function initStock(id) {
  const prod = S.catalog.find(p => p.id === id);
  if (!prod) return;
  prod.stock = 0;
  renderTabContent();
}

function addToCart(id) {
  const prod = S.catalog.find(p=>p.id===id);
  if (!prod) return;
  const qtyEl = document.getElementById('qty-'+id);
  const qty = qtyEl ? Math.max(1, parseInt(qtyEl.value)||1) : 1;
  const existing = S.cart.find(c=>c.product.id===id);
  if (existing) {
    existing.qty += qty;
    updateCartBadge();
    toast(`Updated: ${prod.item} &#215;${existing.qty}`, 'ok');
    return;
  }
  S.cart.push({product:prod, qty});
  updateCartBadge();
  toast(`Added: ${prod.item} &#215;${qty}`, 'ok');
}

function saveItemName(id, name) {
  if (!name) return;
  const prod = S.catalog.find(p=>p.id===id);
  if (prod && prod.item !== name) {
    prod.item = name;
    // update data-item on the row for filtering
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) row.dataset.item = name.toLowerCase();
    toast(`Renamed to: ${name}`, 'ok');
  }
}

  const name = document.getElementById('ni-name')?.value.trim();

  const unit   = document.getElementById('ni-unit')?.value.trim()||'';
  const vendor = document.getElementById('ni-vendor')?.value.trim()||'Unknown';
  const id = 'CUSTOM-' + Date.now();
  const newProd = { id, part, item:name, vendor, unit, dept:S.dept, minStock:null, stock:null };

  S.cart = S.cart.filter(c=>c.product.id!==id);

async function submitOrder() {
  const name = document.getElementById('req-name')?.value.trim();
  const notes = document.getElementById('req-notes')?.value.trim();
  if (!name) { toast('Please enter your name','err'); return; }
  if (!S.cart.length) { toast('Add at least one item','err'); return; }

  const items = S.cart.map(c=>({id:c.product.id, item:c.product.item, vendor:c.product.vendor, unit:c.product.unit, qty:c.qty}));
  const r = await submitOrderApi({dept:S.dept, requester:name, items, notes});
  if (r?.ok || r) {
    toast('Order request submitted! &#9989;', 'ok');
    S.cart = [];
    updateCartBadge();
    document.getElementById('order-modal')?.remove();
    S.orders = await loadOrders(S.dept);
    if (S.tab==='orders') renderTabContent();
  } else {
    toast('Error submitting order. Try again.','err');
  }
}

async function renderAdmin() {
  S.catalog = await loadCatalog();
  S.orders = await loadOrders(null);

  const pending   = S.orders.filter(o=>(o.status||o.Status)==='Pending').length;
  const critical  = S.catalog.filter(p=>stockStatus(p)==='critical').length;
  const low       = S.catalog.filter(p=>stockStatus(p)==='low').length;
  const fulfilled = S.orders.filter(o=>(o.status||o.Status)==='Fulfilled').length;

  setHTML(`
    <div class="hdr">
      <div class="hdr-left"><span class="hdr-title">Purchasing Admin</span></div>
      <div class="hdr-logo">
        <img src="./logo.png" alt="Liquid Graphics">
      </div>
      <div class="hdr-right">
        ${S.isDemo?'<span class="badge b-demo">Demo Mode</span>':''}
        <a href="?" class="btn btn-secondary btn-sm"><i class="ph ph-arrow-left"></i> Departments</a>
      </div>
    </div>
    <div class="wrap">
      ${S.isDemo?`<div class="alert alert-demo">
        &#9888;&#65039; <strong>Demo Mode</strong> &#8212; Data is local to this browser.
        <strong>To enable Google Sheets:</strong>
        1) Open <em>Extensions &#8594; Apps Script</em> in your Google Sheet,
        2) Paste the Apps Script code (copy from the page source "apps-script" template tag),
        3) Deploy as Web App (Anyone can access),
        4) Paste the URL into <code>CFG.API</code> in this HTML file.
      </div>`:''}
      <div class="stats">
        <div class="stat danger"><div class="stat-val">${pending}</div><div class="stat-lbl">Pending Orders</div></div>
        <div class="stat danger"><div class="stat-val">${critical}</div><div class="stat-lbl">Critical Stock</div></div>
        <div class="stat warn"><div class="stat-val">${low}</div><div class="stat-lbl">Low Stock Items</div></div>
        <div class="stat ok"><div class="stat-val">${fulfilled}</div><div class="stat-lbl">Fulfilled Orders</div></div>
      </div>

      <div class="tabs" id="admin-tabs">
        <div class="tab ${S.tab==='orders'?'active':''}" onclick="adminTab('orders')"><i class="ph ph-clipboard-text"></i> Orders${pending?` <span class="badge b-crit" style="margin-left:6px">${pending}</span>`:''}  </div>
        <div class="tab ${S.tab==='inventory'?'active':''}" onclick="adminTab('inventory')"><i class="ph ph-warehouse"></i> Inventory</div>
        <div class="tab ${S.tab==='catalog'?'active':''}" onclick="adminTab('catalog')"><i class="ph ph-books"></i> Catalog</div>
      </div>
      <div id="admin-content"></div>
    </div>
  `);

  if (!['orders','inventory','catalog'].includes(S.tab)) S.tab='orders';
  renderAdminContent();
}

function adminTab(tab) {
  S.tab=tab;
  document.querySelectorAll('#admin-tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active', ['orders','inventory','catalog'][i]===tab);
  });
  renderAdminContent();
}

function renderAdminContent() {
  const el = document.getElementById('admin-content');
  if (!el) return;
  if (S.tab==='orders')    el.innerHTML = renderAdminOrders();
  else if (S.tab==='inventory') el.innerHTML = renderAdminInventory();
  else el.innerHTML = renderAdminCatalog();
}

function renderAdminOrders() {
  const depts = ['', ...CFG.DEPTS.map(d=>d.id)];
  const statuses = ['','Pending','Ordered','Fulfilled','Cancelled'];
  return `
    <div class="card">
      <div class="card-hdr">
        <h3>All Order Requests</h3>
        <div class="frow mb-0" style="margin:0">
          <select id="ao-dept" onchange="filterAdminOrders()">
            <option value="">All Departments</option>
            ${CFG.DEPTS.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}
          </select>
          <select id="ao-status" onchange="filterAdminOrders()">
            <option value="">All Status</option>
            ${['Pending','Ordered','Fulfilled','Cancelled'].map(s=>`<option>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tbl-wrap">
        <table id="orders-table">
          <thead><tr><th>Date</th><th>Dept</th><th>Requester</th><th>Items</th><th>Notes</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${S.orders.length ? S.orders.map(o=>adminOrderRow(o)).join('') : '<tr><td colspan="7" class="text-center td-muted" style="padding:30px">No orders yet.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

function adminOrderRow(o) {
  const id = o.id||o.OrderID;
  const dept = o.dept||o.Department||'';
  const status = o.status||o.Status||'Pending';
  const items = (o.items||o.Items||[]);
  const requester = o.requester||o.Requester||'&#8212;';
  const notes = o.notes||o.Notes||'';
  const adminNotes = o.adminNotes||o.AdminNotes||'';
  return `<tr data-dept="${dept}" data-status="${status}" id="row-${id}">
    <td class="td-muted" style="white-space:nowrap;font-size:12px">${fmtDate(o.ts||o.Timestamp)}</td>
    <td><span class="badge b-pending">${getDeptName(dept)}</span></td>
    <td>${requester}</td>
    <td>${items.map(i=>`<div style="font-size:12px"><strong>${i.item}</strong> &#215;${i.qty}<div class="td-muted">${i.vendor}</div></div>`).join('')}</td>
    <td class="td-muted" style="font-size:12px;max-width:120px">${notes||'&#8212;'}</td>
    <td>${orderBadge(status)}</td>
    <td>
      <div style="display:flex;flex-direction:column;gap:5px">
        <select onchange="quickUpdateStatus('${id}',this.value)" style="font-size:12px;padding:4px 8px">
          ${['Pending','Ordered','Fulfilled','Cancelled'].map(s=>`<option ${s===status?'selected':''}>${s}</option>`).join('')}
        </select>
        <input type="text" placeholder="Admin note&#8230;" value="${adminNotes}" id="anote-${id}" style="font-size:12px;padding:4px 8px">
        <button class="btn btn-primary btn-sm" onclick="saveOrderStatus('${id}')">Save</button>
      </div>
    </td>
  </tr>`;
}

function filterAdminOrders() {
  const dept = document.getElementById('ao-dept')?.value||'';
  const status = document.getElementById('ao-status')?.value||'';
  document.querySelectorAll('#orders-table tbody tr').forEach(r=>{
    const match = (!dept||r.dataset.dept===dept) && (!status||r.dataset.status===status);
    r.style.display=match?'':'none';
  });
}

async function quickUpdateStatus(orderId, status) {
  const row = document.getElementById('row-'+orderId);
  if (row) row.dataset.status=status;
}

async function saveOrderStatus(orderId) {
  const sel = document.querySelector(`#row-${orderId} select`);
  const noteEl = document.getElementById('anote-'+orderId);
  const status = sel?.value||'Pending';
  const adminNotes = noteEl?.value||'';
  const r = await updateOrderStatusApi(orderId, status, adminNotes);
  if (r?.ok || r) {
    toast('Order updated &#9989;','ok');
    S.orders = await loadOrders(null);
    renderAdminContent();
  } else {
    toast('Error updating order','err');
  }
}

    <div class="card">

              <td><button class="btn btn-success btn-sm" onclick="saveStock('${p.id}')">Save</button></td>

}

function filterAdminInv(q) {
  const dept = document.getElementById('ai-dept')?.value||'';
  const vendor = document.getElementById('ai-vendor')?.value.toLowerCase()||'';
  const status = document.getElementById('ai-status')?.value||'';
  document.querySelectorAll('#ai-table tbody tr').forEach(r=>{
    const match = (!q||r.dataset.item?.includes(q.toLowerCase()))
      && (!dept||r.dataset.dept===dept)
      && (!vendor||r.dataset.vendor?.includes(vendor))
      && (!status||r.dataset.status===status);
    r.style.display=match?'':'none';
  });
}

async function saveStock(id) {
  const stock = parseFloat(document.getElementById('stk-'+id)?.value);
  const minStock = parseFloat(document.getElementById('min-'+id)?.value);
  const reorderPoint = parseFloat(document.getElementById('re-'+id)?.value);
  const r = await updateStockApi(id, isNaN(stock)?null:stock, isNaN(minStock)?null:minStock, isNaN(reorderPoint)?null:reorderPoint);
  if (r?.ok || r) {
    toast('Stock updated &#9989;','ok');
    // Update local catalog
    const p = S.catalog.find(x=>x.id===id);
    if (p) { p.stock=isNaN(stock)?p.stock:stock; p.minStock=isNaN(minStock)?p.minStock:minStock; p.reorderPoint=isNaN(reorderPoint)?p.reorderPoint:reorderPoint; }
    // Refresh just the status badge for this row
    const row = document.querySelector(`#ai-table tr[data-id="${id}"]`);
    if (row) { row.cells[0].innerHTML = stockBadge(p); row.dataset.status = stockStatus(p)||''; }
  } else {
    toast('Error saving stock','err');
  }
}

  const vendors = [...new Set(S.catalog.map(p=>p.vendor))].sort();
  return `
    <div class="card">

        <h3>Product Catalog (${S.catalog.length} items)</h3>

async function adminSaveNewItem() {
  const name = document.getElementById('aai-name')?.value.trim();
  if (!name) { toast('Item name is required','err'); return; }
  const part     = document.getElementById('aai-part')?.value.trim()||'';
  const unit     = document.getElementById('aai-unit')?.value.trim()||'';
  const vendor   = document.getElementById('aai-vendor')?.value.trim()||'Unknown';
  const dept     = document.getElementById('aai-dept')?.value||CFG.DEPTS[0]?.id||'';
  const minVal   = document.getElementById('aai-min')?.value;
  const stockVal = document.getElementById('aai-stock')?.value;
  const minStock = minVal   !== '' ? parseFloat(minVal)   : null;
  const stock    = stockVal !== '' ? parseFloat(stockVal) : null;
  const id = 'P-' + Date.now();
  const newProd = {id, part, item:name, vendor, unit, dept, minStock, stock};
  // Optimistic UI update
  S.catalog.push(newProd);
  document.getElementById('admin-add-modal')?.remove();
  renderAdminContent();
  // Save to API / localStorage
  const r = await addProductApi(newProd);
  if (r?.ok || r) {
    toast(`Added: ${name}`, 'ok');
  } else {
    toast('Saved locally — reconnect to sync to Sheets', '');
  }
}

async function adminDeleteItem(id) {
  const prod = S.catalog.find(p=>p.id===id);
  if (!prod) return;
  if (!confirm(`Remove "${prod.item}" from the catalog?`)) return;
  // Optimistic UI update
  S.catalog = S.catalog.filter(p=>p.id!==id);
  renderAdminContent();
  // Delete from API / localStorage
  const r = await deleteProductApi(id);
  if (r?.ok || r) {
    toast(`Removed: ${prod.item}`, 'ok');
  } else {
    toast('Removed locally — reconnect to sync to Sheets', '');
  }
}
function filterAdminCat(q) {
  const v = document.getElementById('ac-vendor')?.value.toLowerCase()||'';
  const d = document.getElementById('ac-dept')?.value||'';
  document.querySelectorAll('#ac-table tbody tr').forEach(r=>{
    const match = (!q||r.dataset.item?.includes(q.toLowerCase()))&&(!v||r.dataset.vendor?.includes(v))&&(!d||r.dataset.dept===d);
    r.style.display=match?'':'none';
  });
}
